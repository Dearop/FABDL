[project]
name = "uniswap_v3_xrpl_contract"
version = "0.1.0"
authors = ["Your Name"]

[build]
source = "contract/src/lib.rs"
output = "target/wasm32-unknown-unknown/release"
target = "wasm32-unknown-unknown"

[local_node]
config_dir = ".bedrock/node-config"
docker_image = "transia/cluster:f5d78179c9d1fbaf8bff8b77a052e263df90faa1"
ledger_interval = 1000

[networks.local]
url = "ws://localhost:6006"
network_id = 63456
faucet_url = "http://localhost:8080/faucet"

[networks.alphanet]
url = "wss://alphanet.nerdnest.xyz"
network_id = 21465
faucet_url = "https://alphanet.faucet.nerdnest.xyz/accounts"

# Pool contract — holds all AMM state (mint, burn, swap, collect, admin).
# Deploy first; note the contract address P.
[contracts.pool]
source = "contract/src/lib.rs"
abi = "contract/build/pool-abi.json"

# Manager contract — thin admin wrapper, calls Pool via cross-contract invoke.
# Deploy second; then call: bedrock call P set_manager --params '{"manager":"<manager-addr>"}'
[contracts.manager]
source = "contract-manager/src/lib.rs"
abi = "contract-manager/build/manager-abi.json"

[wallets]
keystore = ".wallets/keystore.json"
